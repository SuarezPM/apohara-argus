name: fuzz

# Cargo-fuzz requires nightly Rust (libFuzzer's
# `#![feature(link_cfg)]` internals). The parent workspace
# pins to stable 1.88 in `rust-toolchain.toml`, so this
# workflow installs its own nightly toolchain just for the
# fuzz job.
on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/argus-slop/**'
      - 'crates/argus-verify/**'
      - 'crates/argus-otel/**'
      - 'fuzz/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/fuzz.yml'
  push:
    branches: [main]
    paths:
      - 'crates/argus-slop/**'
      - 'crates/argus-verify/**'
      - 'crates/argus-otel/**'
      - 'fuzz/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/fuzz.yml'
  # Weekly full-corpus sweep to find regressions that
  # the per-PR 10-minute window missed. The job is
  # `fuzz_nightly` (separate `on:` block below) — see the
  # matrix there for the longer `-runs=3600000` budget.
  workflow_dispatch:

# The two CI jobs (PR smoke + nightly full) intentionally
# use different budgets so a regression introduced in a
# PR is caught in < 15 min of CI time, while the weekly
# sweep runs for 1 hour per target. Crashes are uploaded
# as workflow artifacts and posted to the job summary.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only GITHUB_TOKEN. The fuzz job only needs
# `contents: read` (to check out the repo and read
# the fuzz targets); it never writes to the repo,
# creates releases, or opens PRs. Top-level
# `permissions: contents: read` is the OpenSSF
# Scorecard Token-Permissions check pattern: any
# job that needs to widen does so explicitly
# (none of the fuzz jobs do).
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # PR smoke: 5 min per target, on every PR touching a fuzzed crate.
  # ------------------------------------------------------------------
  fuzz_pr:
    name: fuzz (PR smoke, 5min/target)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Job-level `RUSTC_BOOTSTRAP=1` so EVERY step
      # in this job (checkout, install, build, run)
      # inherits the override. Step-level `env:`
      # blocks did NOT propagate to the
      # `cargo install cargo-fuzz` subprocess
      # (the rustix crate still failed with
      # `cannot find attribute
      # rustc_layout_scalar_valid_range_start`).
      # Job-level env is the only way to make
      # sure every `rustc` invocation in the
      # cargo-fuzz dep tree sees the bootstrap
      # flag.
      RUSTC_BOOTSTRAP: '1'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pin the toolchain. Nightly because cargo-fuzz
      # needs the unstable `link_cfg` feature for the
      # `#[no_mangle] extern "C" fn LLVMFuzzerTestOneInput`
      # shim that libFuzzer links against.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly-2026-06-01
          components: rust-src

      # cargo-fuzz is NOT a Rust toolchain component — it
      # is a separate cargo subcommand that ships in the
      # `cargo-fuzz` crate. The first run of this workflow
      # failed with `error: no such command: 'fuzz'` because
      # `dtolnay/rust-toolchain` only installs rustc/cargo,
      # not cargo subcommands. The `cargo install` below
      # fetches the latest cargo-fuzz release into the
      # runner's `$CARGO_HOME/bin`; subsequent runs are
      # cached by GitHub Actions so this is only a few
      # seconds of overhead on the first PR of a branch.
      # We pin to a specific version to keep the fuzz
      # behavior deterministic across runs (libFuzzer
      # has subtle ABI changes between releases).
      - name: Install cargo-fuzz
        env:
          # `RUSTC_BOOTSTRAP=1` is REQUIRED on the
          # install step too — not just the build
          # step. The `cargo install cargo-fuzz`
          # command compiles cargo-fuzz itself,
          # which depends on `rustix v0.36.5`,
          # which uses the nightly-only
          # `#[cfg_attr(rustc_attrs,
          #   rustc_layout_scalar_valid_range_start(…))]`
          # attribute. The eleventh run of this
          # workflow failed here (after the
          # build-step RUSTC_BOOTSTRAP fix in 4dec557
          # worked) with:
          #   error: cannot find attribute
          #     `rustc_layout_scalar_valid_range_start`
          #   error: could not compile `rustix` (lib)
          #   error: failed to compile
          #     `cargo-fuzz v0.13.2`
          # The `rustc_attrs` cfg flag is only set
          # when RUSTC_BOOTSTRAP is non-zero. Without
          # it, the nightly compiler rejects the
          # attribute as "reserved for use by the
          # rustc compiler".
          RUSTC_BOOTSTRAP: '1'
        # `+nightly-2026-06-01` is REQUIRED here, not a
        # nice-to-have. The `+<toolchain>` syntax is
        # the cargo-wrapper's way of saying \"resolve
        # `cargo` to the nightly toolchain for this
        # invocation\". Without it, the `cargo` binary
        # on PATH is the runner-image default (stable),
        # and `cargo install cargo-fuzz` builds the
        # cargo-fuzz *binary* with stable cargo. The
        # stable-built cargo-fuzz then spawns its own
        # `cargo build` with RUSTFLAGS=`-Zsanitizer=
        # address` (a nightly-only flag), and stable
        # cargo rejects it with:
        #   error: the option `Z` is only accepted on
        #     the nightly compiler
        # which is what the eighth run of this workflow
        # actually failed on (the `RUSTUP_TOOLCHAIN` env
        # override alone was not enough — cargo-fuzz
        # reads the toolchain at install time, not at
        # run time, and embeds the path to that cargo
        # binary in itself).
        run: cargo +nightly-2026-06-01 install cargo-fuzz --version 0.13.2 --locked

      # We don't depend on the sccache cache for fuzz
      # builds (they're short, and the cache hit rate is
      # low for the fuzz-only codepath). The 5min-per-target
      # budget is enough for libFuzzer to either find a
      # crash or report a clean run; we don't try to maximize
      # coverage in the PR loop.
      #
      # IMPORTANT: cargo-fuzz resolves the manifest path
      # as `fuzz/Cargo.toml` relative to the WORKSPACE
      # ROOT, not relative to the cwd. Running from the
      # default cwd (the workspace root, which is what
      # GitHub Actions sets when no `working-directory`
      # is specified) is the right call. An earlier
      # version of this workflow used `working-directory:
      # fuzz` which made cargo-fuzz look for
      # `fuzz/fuzz/Cargo.toml` (the double-fuzz path
      # error from the second failed run).
      #
      # Same `+nightly-2026-06-01` override as the
      # install step above: the `cargo` binary
      # resolved by the `cargo +nightly-2026-06-01`
      # wrapper IS the nightly toolchain's cargo,
      # so the `-Zsanitizer=address` RUSTFLAGS that
      # cargo-fuzz injects are accepted.
      - name: Build fuzz targets
        env:
          # `RUSTC_BOOTSTRAP=1` is REQUIRED to compile
          # the fuzz targets. The `rustix` crate (a
          # transitive dep of `cargo-fuzz`) uses
          # `#[cfg_attr(rustc_attrs,
          #   rustc_layout_scalar_valid_range_start(0xf001))]`
          # to constrain the layout of its `c_int` type
          # so the compiler can't elide bounds checks.
          # The `rustc_attrs` cfg flag is normally only
          # set when the rustc compiler itself is being
          # built — for external builds you have to
          # opt in via `RUSTC_BOOTSTRAP=1`. Without
          # this, the nightly compiler rejects the
          # attribute with:
          #   error: attributes starting with `rustc`
          #     are reserved for use by the `rustc`
          #     compiler
          # which is what the tenth run of this
          # workflow actually failed on.
          RUSTC_BOOTSTRAP: '1'
        run: cargo +nightly-2026-06-01 fuzz build

      - name: Run argus_slop_deterministic (5 min)
        run: cargo +nightly-2026-06-01 fuzz run argus_slop_deterministic -- -max_total_time=300

      - name: Run argus_verify_signature (5 min)
        run: cargo +nightly-2026-06-01 fuzz run argus_verify_signature -- -max_total_time=300

      # If a crash was found, libFuzzer exits with a
      # non-zero status and the artifact `crash-<id>` is
      # already in the `fuzz/artifacts/<target>/` directory
      # by the time we get here. We upload it so the PR
      # author can pull the file and reproduce locally
      # with `cargo fuzz run <target> <path-to-crash>`.
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: fuzz/artifacts/
          retention-days: 7
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # Weekly full-corpus sweep, manual_dispatch, 1 hour per target.
  # ------------------------------------------------------------------
  fuzz_nightly:
    name: fuzz (nightly, 1h/target)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == 'cron'
    env:
      RUSTC_BOOTSTRAP: '1'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly-2026-06-01
          components: rust-src
      - name: Install cargo-fuzz
        run: cargo +nightly-2026-06-01 install cargo-fuzz --version 0.13.2 --locked
      - name: Build fuzz targets
        run: cargo +nightly-2026-06-01 fuzz build
      - name: Run argus_slop_deterministic (1 hour)
        run: cargo +nightly-2026-06-01 fuzz run argus_slop_deterministic -- -max_total_time=3600
      - name: Run argus_verify_signature (1 hour)
        run: cargo +nightly-2026-06-01 fuzz run argus_verify_signature -- -max_total_time=3600
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fuzz-crashes-nightly-${{ github.run_id }}
          path: fuzz/artifacts/
          retention-days: 30
          if-no-files-found: ignore
