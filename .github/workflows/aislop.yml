name: aislop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run aislop scan
        id: scan
        run: |
          npx --yes aislop@latest scan --format=json --output=aislop-report.json .
          SCORE=$(jq -r '.score // 0' aislop-report.json)
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "findings=$(jq -r '.findings | length' aislop-report.json)" >> $GITHUB_OUTPUT

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: aislop-report
          path: aislop-report.json
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## aislop scan results
            - **Score**: ${{ steps.scan.outputs.score }}/100
            - **Findings**: ${{ steps.scan.outputs.findings }}

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

      - name: Fail if score > threshold
        if: steps.scan.outputs.score > 60
        run: |
          echo "::error::aislop score ${{ steps.scan.outputs.score }} exceeds threshold of 60"
          exit 1
