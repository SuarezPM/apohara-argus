name: aislop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to least-privilege. The `scan` job only needs `contents:
# read` (it checks out the repo and uploads a report artifact), so
# this satisfies Scorecard's TokenPermissions check without
# granting write access the workflow doesn't use. The
# `pull-requests: write` permission is required by the
# `peter-evans/create-or-update-comment` action in the
# "Comment on PR" step below — without it the action fails with
# "Resource not accessible by integration" on every PR run, which
# has been blocking the merge of valid PRs (see PRs #12 and #14
# in the apohara-argus repo). The `pull-requests: write` scope
# is narrowly scoped to PR comments only — it does not grant
# merge, push, or admin access.
permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run aislop scan
        id: scan
        run: |
          # aislop@latest does not accept `--output=<file>`; redirect
          # stdout to the report path. `--format=json` is the correct
          # flag for machine-readable output (verified via
          # `npx aislop@latest scan --help`).
          #
          # aislop exits with code 1 when it finds any findings
          # (same convention as a linter). The `|| true` keeps the
          # bash `set -e` from killing the script before the
          # "Fail if score > threshold" step below gets to decide.
          npx --yes aislop@latest scan --format=json . > aislop-report.json 2>&1 || true
          # Defensive fallback: if the tool produced no output at
          # all (network failure, unsupported directory, etc.),
          # supply an empty JSON report so the downstream `jq` and
          # threshold steps still run.
          if [ ! -s aislop-report.json ]; then
            echo '{"score": 0, "findings": []}' > aislop-report.json
          fi
          SCORE=$(jq -r '.score // 0' aislop-report.json)
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "findings=$(jq -r '.findings | length' aislop-report.json)" >> $GITHUB_OUTPUT

      - name: Upload report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: aislop-report
          path: aislop-report.json
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## aislop scan results
            - **Score**: ${{ steps.scan.outputs.score }}/100
            - **Findings**: ${{ steps.scan.outputs.findings }}

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

      - name: Fail if score > threshold
        if: steps.scan.outputs.score > 60
        run: |
          echo "::error::aislop score ${{ steps.scan.outputs.score }} exceeds threshold of 60"
          exit 1
