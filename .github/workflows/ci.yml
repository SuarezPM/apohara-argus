name: CI

# CI: rustfmt, clippy (-D warnings), the test matrix (Linux/macOS/Windows),
# and cargo-deny (licenses + RUSTSEC advisories). Push on main and every PR.
# A red suite blocks the merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default; no job needs to widen.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # All clippy warnings are errors (the "no warning debt" rule).
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.7.4
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.7.4

      # Hard gate: the full workspace test suite (covers all 13 crates —
      # argus-{core,crypto,llm,slop,github,guard,verify,lens,agent,dashboard,
      # cli,otel,mcp}).
      - name: Run workspace tests
        run: cargo test --workspace --locked

      # ReDoS guard: the harness=false benches compile as binaries and run
      # under `cargo test --benches`. Pathological inputs must stay
      # sub-millisecond.
      - name: Run bench tests (ReDoS guard)
        run: cargo test --workspace --benches --locked

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      # Fails on any dependency license outside the allowlist in deny.toml.
      - run: cargo deny check licenses

      # Monitor RUSTSEC advisories against the dependency tree
      # (dependency_monitoring). Uses the [advisories] section already in
      # deny.toml. The 6 ignored advisories in S.2 are documented with
      # per-entry rationale (Scorecard "Pinned-Dependencies" + "Dependency-
      # Update-Tool" gate).
      - run: cargo deny check advisories
