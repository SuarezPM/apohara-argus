# Workflow to publish the 6 remaining apohara-argus crates
# to crates.io. The CARGO_REGISTRY_TOKEN secret is already
# set at the repo level (per Pablo's authorization); we just
# use `secrets.CARGO_REGISTRY_TOKEN` here.
#
# Trigger: workflow_dispatch with a `crate` input.
#   - "all"     -> publish all 6 remaining crates in dep order
#                 with 10-min waits between each (1h total)
#   - <single>  -> publish just that one crate
#
# The 10-min wait between publishes is the crates.io rate-
# limit window. Local `cargo publish` runs hit 429 if you
# fire 5+ crates in quick succession; the GH Actions
# throttling lets us walk through the list one at a time
# without the user babysitting the terminal.
name: publish-crates

on:
  workflow_dispatch:
    inputs:
      crate:
        description: 'Which crate to publish (or "all" for the remaining 6)'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - argus-agent
          - argus-verify
          - argus-guard
          - argus-lens
          - argus-dashboard
          - apohara-argus-cli

permissions:
  contents: read

jobs:
  publish:
    name: publish ${{ inputs.crate }}
    runs-on: ubuntu-latest
    # "all" needs ~60min (6 × 10min waits); single crates need ~5min.
    # 6h is the GH Actions max for a free public repo.
    timeout-minutes: 360
    steps:
      - name: Checkout apohara-argus @ HEAD
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install Rust toolchain (match workspace rust-version)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88

      - name: Cache cargo registry + target between publishes
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-on-failure: true

      - name: Publish crate(s) to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # The 6 remaining crates, ordered by dependency
          # (deps first, leaf crates last). All internal deps
          # (apohara-argus-core, argus-crypto, argus-slop,
          # argus-github, argus-otel, argus-llm,
          # apohara-argus-mcp) are already on crates.io, so
          # the dep order here is just topological.
          CRATES=(
            argus-agent
            argus-verify
            argus-guard
            argus-lens
            argus-dashboard
            apohara-argus-cli
          )

          if [ "${{ inputs.crate }}" = "all" ]; then
            TARGETS=("${CRATES[@]}")
          else
            TARGETS=("${{ inputs.crate }}")
          fi

          for c in "${TARGETS[@]}"; do
            echo "============================================"
            echo "=== Publishing $c to crates.io"
            echo "============================================"
            # `--allow-dirty` because the GH runner checks out
            # to a clean state but the keyword fix in the
            # previous commit may leave the lockfile dirty
            # (workspace keywords changed 6 -> 5, lockfile
            # was regenerated as part of `cargo build` but
            # not committed if it was identical to before).
            cd "${GITHUB_WORKSPACE}/crates/$c"
            cargo publish \
              --token "${CARGO_REGISTRY_TOKEN}" \
              --allow-dirty
            cd "${GITHUB_WORKSPACE}"

            if [ "$c" != "${TARGETS[-1]}" ]; then
              echo "============================================"
              echo "=== Waiting 10 min for crates.io to index"
              echo "    (rate limit window — next publish at:"
              echo "    $(date -u -d '+10 min' '+%H:%M:%S UTC'))"
              echo "============================================"
              sleep 600
            fi
          done

          echo ""
          echo "============================================"
          echo "=== Publish batch complete"
          for c in "${TARGETS[@]}"; do
            echo "    $c: published (verify with cargo search $c)"
          done
          echo "============================================"
